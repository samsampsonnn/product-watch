name: Product Watch

on:
  schedule:
    # Monday 9:00 AM UK (9:00 GMT / 10:00 BST)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: product-watch/package-lock.json

      - name: Install dependencies
        working-directory: product-watch
        run: npm install

      - name: Run product watch
        working-directory: product-watch
        run: node run.js

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add product-watch/reports/
          git diff --staged --quiet || git commit -m "Product watch report $(date -u +%Y-%m-%d)"
          git push origin main
